<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>News That Matters</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
    :root{
      --accent:#7c3aed;--text:#111827;--sub:#4b5563;--muted:#9ca3af;
      --border:rgba(0,0,0,.06);
    }
    html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;color:var(--text)}
    body{display:flex;align-items:center;justify-content:center;flex-direction:column;
      background:
        radial-gradient(ellipse 70% 55% at 10% 0%,#ddd6fe 0%,transparent 55%),
        radial-gradient(ellipse 55% 45% at 90% 100%,#bfdbfe 0%,transparent 50%),#ede9fe}

    /* ── Phone shell ── */
    .phone{position:relative;z-index:1;margin-top:0;
      width:100%;max-width:430px;height:100dvh;
      background:#f5f3ff;overflow:hidden;display:flex;flex-direction:column}
    @media(min-width:500px){
      .phone{height:min(900px,calc(96dvh - 30px));border-radius:44px;
        box-shadow:0 0 0 1px rgba(0,0,0,.06),
                   0 8px 32px rgba(109,40,217,.1),
                   0 40px 80px rgba(0,0,0,.18)}}

    /* ── Status bar ── */
    .status-bar{display:flex;justify-content:space-between;align-items:center;
      padding:14px 24px 0;flex-shrink:0;font-size:12px;font-weight:600;color:var(--text)}

    /* ── Header ── */
    .app-header{padding:10px 20px 6px;flex-shrink:0}

    /* ── Progress dots ── */
    .prog-dots{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 0 4px}
    .prog-dot{width:6px;height:6px;border-radius:99px;background:#d8b4fe;
      transition:all .3s cubic-bezier(.4,0,.2,1)}
    .prog-dot.active{width:20px;background:var(--accent)}

    /* ── Card stack ── */
    .card-stack{flex:1;position:relative;margin:0 14px 56px;overflow:visible}

    /* ── Swipe card ── */
    .swipe-card{position:absolute;inset:0;
      background:#fff;border-radius:24px;overflow:hidden;
      display:flex;flex-direction:column;
      box-shadow:0 1px 4px rgba(0,0,0,.05),0 8px 24px rgba(0,0,0,.08),0 24px 48px rgba(0,0,0,.06);
      transform-origin:center 110%;
      will-change:transform,opacity;
      user-select:none;-webkit-user-select:none}
    .swipe-card.is-behind{pointer-events:none}
    .swipe-card.is-hidden{pointer-events:none;opacity:0!important;transform:scale(.88)!important}

    /* ── Score hero — the first thing you see on every card ── */
    .score-hero{flex-shrink:0;padding:16px 16px 14px;
      display:flex;align-items:flex-start;justify-content:space-between;
      position:relative;overflow:hidden}
    .score-hero::after{content:'';position:absolute;inset:0;
      background:linear-gradient(180deg,rgba(0,0,0,.0) 60%,rgba(0,0,0,.12) 100%);pointer-events:none}

    /* rank watermark inside hero */
    .rank-wm{position:absolute;top:-8px;right:10px;
      font-family:'Plus Jakarta Sans',sans-serif;font-weight:900;
      font-size:88px;line-height:1;color:rgba(255,255,255,.14);
      user-select:none;pointer-events:none;letter-spacing:-.04em;z-index:0}

    /* left column: big number + label */
    .score-left{display:flex;flex-direction:column;gap:2px;z-index:1}
    .score-ai-label{font-size:9px;font-weight:800;letter-spacing:.1em;
      text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:2px}
    .score-big{font-family:'Plus Jakarta Sans',sans-serif;font-weight:900;
      font-size:52px;line-height:1;letter-spacing:-.04em;color:#fff;
      text-shadow:0 2px 12px rgba(0,0,0,.2)}
    .score-denom{font-size:16px;font-weight:600;opacity:.55;margin-left:2px}
    .score-level-pill{display:inline-flex;align-items:center;gap:4px;
      padding:3px 10px;border-radius:99px;margin-top:5px;
      background:rgba(255,255,255,.22);backdrop-filter:blur(4px);
      border:1px solid rgba(255,255,255,.3);width:fit-content}
    .score-level-pill span{font-size:10px;font-weight:800;letter-spacing:.07em;
      text-transform:uppercase;color:#fff}
    .score-pulse{width:7px;height:7px;border-radius:99px;background:#fff;
      animation:heroPulse 1.8s ease-in-out infinite}
    @keyframes heroPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

    /* right column: coverage + persona mini-bars */
    .score-right{display:flex;flex-direction:column;gap:8px;min-width:108px;z-index:1}
    .mini-bar-wrap{display:flex;flex-direction:column;gap:3px}
    .mini-bar-label{display:flex;align-items:center;justify-content:space-between}
    .mini-bar-name{font-size:9px;font-weight:700;letter-spacing:.06em;
      text-transform:uppercase;color:rgba(255,255,255,.7)}
    .mini-bar-pct{font-size:10px;font-weight:800;color:#fff}
    .mini-track{height:4px;border-radius:99px;background:rgba(255,255,255,.2);overflow:hidden}
    .mini-fill{height:100%;border-radius:99px;width:0%;
      background:rgba(255,255,255,.85);
      transition:width 1.2s cubic-bezier(.4,0,.2,1)}

    /* insight strip below hero */
    .score-insight{padding:7px 16px 8px;
      background:rgba(0,0,0,.04);border-bottom:1px solid rgba(0,0,0,.06);
      display:flex;align-items:center;gap:6px;flex-shrink:0}
    /* ── Score breakdown sheet ── */

    /* ── Card body ── */
    .card-body{flex:1;display:flex;flex-direction:column;padding:11px 16px 10px;overflow:hidden;min-height:0}

    /* ── Flags row (inside card body) ── */
    .flags-row{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-shrink:0}
    .flags-cluster{display:flex;gap:2px;font-size:18px;line-height:1}
    .region-badge{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
      padding:2px 8px;border-radius:99px;background:rgba(0,0,0,.05);
      border:1px solid rgba(0,0,0,.07);color:var(--muted)}

    /* ── Heading ── */
    .card-heading{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:900;
      line-height:1.25;letter-spacing:-.025em;color:#111827;margin-bottom:8px;flex-shrink:0}

    /* ── Tabs ── */
    .tab-bar{display:flex;gap:4px;padding:3px;margin-bottom:10px;
      background:#f3f4f6;border-radius:12px;flex-shrink:0}

    /* default inactive state */
    .tab-btn{flex:1;padding:6px 4px;border-radius:9px;border:none;background:transparent;
      font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;
      transition:all .2s ease;white-space:nowrap;touch-action:manipulation}

    /* What Happened — active: plain white pill */
    .tab-btn.active{background:#fff;color:var(--text);
      box-shadow:0 1px 4px rgba(0,0,0,.1),0 0 0 .5px rgba(0,0,0,.06)}

    /* Why It Matters — always accent-tinted, even when inactive */
    .tab-btn.matters-btn{color:var(--accent);
      background:linear-gradient(135deg,rgba(124,58,237,.1),rgba(192,38,211,.07));
      border:1px solid rgba(124,58,237,.18)}

    /* Why It Matters — active: full accent fill */
    .tab-btn.matters-btn.active{
      background:linear-gradient(135deg,#7c3aed,#a855f7);
      color:#fff;border-color:transparent;
      box-shadow:0 2px 8px rgba(124,58,237,.35)}

    /* ── Tab content — grid-stacked for zero layout shift FEAT 2 ── */
    .tab-content{display:grid;grid-template-columns:1fr;flex:1;min-height:0;overflow:hidden}
    .tab-pane{grid-row:1;grid-column:1;overflow-y:auto;overflow-x:hidden;
      opacity:0;pointer-events:none;visibility:hidden;
      transform:translateX(28px);
      transition:opacity .26s ease,transform .26s cubic-bezier(.4,0,.2,1)}
    .tab-pane::-webkit-scrollbar{display:none}
    .tab-pane.active{opacity:1;pointer-events:auto;visibility:visible;transform:translateX(0);
      transition:opacity .28s ease,transform .28s cubic-bezier(.4,0,.2,1)}

    /* ── Body text ── */
    .body-text{font-size:12.5px;color:var(--sub);line-height:1.65;margin-bottom:10px}
    .matters-box{background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.16);
      border-radius:14px;padding:11px 13px;margin-bottom:10px}
    .matters-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
      color:var(--accent);margin-bottom:5px}

    /* ── Sector chips ── */
    .chips-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;flex-shrink:0}
    .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;
      border-radius:99px;font-size:10.5px;font-weight:600;white-space:nowrap}

    /* ── Card footer ── */
    .card-footer{display:flex;align-items:center;justify-content:space-between;
      padding-top:8px;margin-top:8px;border-top:1px solid #f3f4f6;flex-shrink:0}
    .footer-rank{display:flex;align-items:center;gap:5px}
    .rank-badge{display:inline-flex;align-items:center;justify-content:center;
      width:22px;height:22px;border-radius:8px;background:#f3f4f6;
      font-size:10px;font-weight:800;color:var(--sub)}
    .footer-rank-text{font-size:11px;font-weight:600;color:var(--muted)}
    .sources-btn{display:inline-flex;align-items:center;gap:5px;
      padding:6px 14px;border-radius:10px;border:1px solid rgba(124,58,237,.2);
      background:rgba(124,58,237,.06);font-size:11.5px;font-weight:600;
      color:var(--accent);cursor:pointer;touch-action:manipulation;
      transition:background .15s ease}
    .sources-btn:active{background:rgba(124,58,237,.12)}

    /* ── Swipe hint arrows ── */
    .swipe-hint{position:absolute;top:50%;transform:translateY(-50%);
      width:32px;height:32px;border-radius:99px;background:rgba(255,255,255,.8);
      backdrop-filter:blur(8px);border:1px solid rgba(0,0,0,.07);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 2px 8px rgba(0,0,0,.1);opacity:.5;pointer-events:none;
      transition:opacity .3s ease}
    .hint-left{left:-8px}.hint-right{right:-8px}

    /* ── AI insight strip — compact chip row, no sentences ── */
    .score-insight{padding:5px 12px 5px;
      background:rgba(0,0,0,.03);border-bottom:1px solid rgba(0,0,0,.05);
      display:flex;align-items:center;gap:5px;flex-shrink:0;overflow:hidden}
    .insight-chip{display:inline-flex;align-items:center;gap:3px;
      padding:2px 8px;border-radius:99px;white-space:nowrap;
      font-size:10px;font-weight:700;letter-spacing:.03em;
      background:rgba(0,0,0,.05);color:var(--sub);
      border:1px solid rgba(0,0,0,.07)}
    .insight-sep{color:#d1d5db;font-size:10px;flex-shrink:0}
    .insight-spacer{flex:1}
    .insight-tap{display:inline-flex;align-items:center;justify-content:center;
      width:22px;height:22px;border-radius:99px;flex-shrink:0;
      background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2);
      color:var(--accent);cursor:pointer;touch-action:manipulation;
      font-size:11px;font-weight:800;transition:background .15s ease}
    .insight-tap:active{background:rgba(124,58,237,.2)}
    .breakdown-row{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid #f3f4f6}
    .breakdown-row:last-child{border-bottom:none}
    .breakdown-icon{width:32px;height:32px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .breakdown-info{flex:1}
    .breakdown-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px}
    .breakdown-desc{font-size:11px;color:var(--muted);line-height:1.4}
    .breakdown-pct{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:800;color:var(--text);flex-shrink:0}
    .breakdown-track{height:3px;border-radius:99px;background:#f3f4f6;margin-top:4px;overflow:hidden}
    .breakdown-fill{height:100%;border-radius:99px;width:0%;transition:width .9s cubic-bezier(.4,0,.2,1)}

    /* ── Bottom sheet (fixed, outside phone) ── */
    #sheet{position:fixed;inset:0;z-index:1000;pointer-events:none}
    #sheet.open{pointer-events:auto}
    #sh-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.4);
      backdrop-filter:blur(4px);opacity:0;transition:opacity .3s ease;cursor:pointer}
    #sheet.open #sh-backdrop{opacity:1}
    #sh-panel{position:absolute;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
      width:100%;max-width:430px;max-height:75vh;
      background:#fff;border-radius:28px 28px 0 0;
      border:1px solid rgba(0,0,0,.06);border-bottom:none;
      display:flex;flex-direction:column;overflow:hidden;
      transition:transform .35s cubic-bezier(.32,.72,0,1);
      box-shadow:0 -8px 40px rgba(0,0,0,.12)}
    #sheet.open #sh-panel{transform:translateX(-50%) translateY(0)}
    .drag-handle{width:36px;height:4px;border-radius:99px;background:#e5e7eb;
      margin:12px auto 0;flex-shrink:0}
    #sh-head{padding:14px 20px 12px;border-bottom:1px solid #f3f4f6;flex-shrink:0}
    #sh-scroll{overflow-y:auto;flex:1;padding-bottom:env(safe-area-inset-bottom,24px)}
    #sh-scroll::-webkit-scrollbar{display:none}
    .art-row{display:flex;gap:12px;padding:14px 20px;border-bottom:1px solid #f9fafb;
      text-decoration:none;color:inherit;transition:background .12s;align-items:flex-start}
    .art-row:active{background:#f9fafb}
    .art-num{width:24px;height:24px;border-radius:8px;background:#f3f4f6;
      display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
      color:var(--muted);flex-shrink:0;margin-top:1px}

    /* ── Live dot ── */
    @keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,.45)}50%{box-shadow:0 0 0 5px rgba(124,58,237,0)}}
    .live-dot{width:6px;height:6px;border-radius:99px;background:var(--accent);animation:glowPulse 2s infinite}

    /* ── Loading / Error states ── */
    .loading-state,.error-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;text-align:center;padding:20px}
    .spinner{width:36px;height:36px;border:3px solid #e5e7eb;border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-state p,.error-state p{font-size:13px;color:var(--muted);font-weight:500}
    .error-state h3{font-size:15px;font-weight:700;color:var(--text)}
    .retry-btn{padding:8px 20px;border-radius:12px;border:1px solid rgba(124,58,237,.3);background:rgba(124,58,237,.08);font-size:13px;font-weight:600;color:var(--accent);cursor:pointer}

    /* ── Stale bar ── */
    .stale-bar{background:rgba(245,158,11,.1);border-bottom:1px solid rgba(245,158,11,.25);padding:4px 16px;text-align:center;font-size:10px;font-weight:700;color:#92400e;letter-spacing:.04em;flex-shrink:0;text-transform:uppercase}

<body>

        <h1 style="font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:900;letter-spacing:-.03em;line-height:1;color:var(--text)">News That Matters</h1>

    </div>
  </div>

</div><!-- /phone -->

<!-- Bottom sheet — fixed, outside phone to avoid overflow:hidden clipping -->
<div id="sheet">
  <div id="sh-backdrop" onclick="closeSheet()"></div>
  <div id="sh-panel">
    <div class="drag-handle"></div>
    <div id="sh-head">
      <p id="sh-label" style="font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:5px"></p>
      <h2 id="sh-heading" style="font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:800;line-height:1.3;letter-spacing:-.02em;color:var(--text)"></h2>

      </p>
    </div>
  </div>
</div>

// ── Tab switch with directional animation ─────────────────────────────────────
const _tabDir={};
function switchTab(cid,tab,btn,idx){
  const prev=_tabDir[cid]??0,dir=idx>prev?1:-1;
  _tabDir[cid]=idx;
  const wrap=document.getElementById(`${cid}-wrap`);
  const incoming=document.getElementById(`${cid}-${tab}`);
  const outgoing=wrap.querySelector(".tab-pane.active");
  if(!outgoing||outgoing===incoming)return;
  incoming.style.cssText="transform:translateX("+(dir*30)+"px);opacity:0;visibility:visible;pointer-events:none;transition:none";
  incoming.getBoundingClientRect();
  outgoing.style.cssText="transition:opacity .22s ease,transform .22s cubic-bezier(.4,0,.2,1);transform:translateX("+(-dir*30)+"px);opacity:0";
  incoming.style.cssText="transition:opacity .28s ease,transform .28s cubic-bezier(.4,0,.2,1);transform:translateX(0);opacity:1;visibility:visible;pointer-events:auto";
  setTimeout(()=>{
    outgoing.classList.remove("active");outgoing.style.cssText="";
    incoming.classList.add("active");incoming.style.cssText="";
  },280);
  btn.closest(".tab-bar").querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

// ── Swipe engine ─────────────────────────────────────────────────────────────
let curr=0,dragX=0,dragging=false,swiping=false,startX=0,startY=0,startTime=0;
const THRESHOLD=85,cards=[];

function getCardEl(i){return document.getElementById(`card-${i}`);}

function positionAll(delta=0){
  const progress=Math.min(1,Math.abs(delta)/THRESHOLD);
  const goingLeft=delta<0;
  EVENTS.forEach((_,i)=>{
    const el=getCardEl(i);if(!el)return;
    if(i===curr){
      const rot=delta/22;
      el.style.transition="none";
      el.style.transform=`translateX(${delta}px) rotate(${rot}deg)`;
      el.style.opacity="1";el.style.zIndex=EVENTS.length;
    } else {
      const behindIdx=goingLeft?curr+1:curr-1;
      if(i===behindIdx&&i>=0&&i<EVENTS.length){
        const s=0.93+0.07*progress,ty=10*(1-progress);
        el.style.transition="none";
        el.style.transform=`scale(${s}) translateY(${ty}px)`;
        el.style.opacity=String(.75+.25*progress);
        el.style.zIndex=EVENTS.length-1;
        el.classList.remove("is-hidden");
      } else if(i===curr+1){
        el.style.transform="scale(0.93) translateY(10px)";
        el.style.opacity=".75";el.style.zIndex=EVENTS.length-2;
        el.classList.remove("is-hidden");
      } else {
        el.style.opacity="0";el.style.zIndex="0";
        el.classList.add("is-hidden");
      }
    }
  });
}

function snapBack(){
  const el=getCardEl(curr);
  el.style.transition="transform .4s cubic-bezier(.175,.885,.32,1.275),opacity .3s ease";
  el.style.transform="translateX(0) rotate(0deg)";
  positionAll(0);
}

function flyOff(dir){
  const el=getCardEl(curr);
  const tx=dir*520,rot=dir*18;
  el.style.transition="transform .36s cubic-bezier(.4,0,.2,1),opacity .3s ease";
  el.style.transform=`translateX(${tx}px) rotate(${rot}deg)`;
  el.style.opacity="0";
  const next=curr-dir; // dir: -1=swipe left→next, +1=swipe right→prev
  if(next<0||next>=EVENTS.length){snapBack();return;}
  curr=next;
  setTimeout(()=>{
    updateUI();
    positionAll(0);
    animateGauges();
  },320);
}

function onDown(e){
  if(e.target.closest("button")||e.target.closest("a"))return;
  dragging=true;swiping=false;dragX=0;
  startX=e.touches?.[0].clientX??e.clientX;
  startY=e.touches?.[0].clientY??e.clientY;
  startTime=Date.now();
}
function onMove(e){
  if(!dragging)return;
  const x=e.touches?.[0].clientX??e.clientX;
  const y=e.touches?.[0].clientY??e.clientY;
  const dx=x-startX,dy=y-startY;
  if(!swiping){
    if(Math.abs(dx)<4&&Math.abs(dy)<4)return;
    if(Math.abs(dx)>Math.abs(dy)){swiping=true;}
    else{dragging=false;return;}
  }
  if(swiping){e.preventDefault();dragX=dx;positionAll(dragX);}
}
function onUp(){
  if(!dragging){return;}
  dragging=false;swiping=false;
  const vel=Math.abs(dragX)/(Date.now()-startTime);
  if(Math.abs(dragX)>THRESHOLD||vel>.55){
    flyOff(dragX>0?1:-1);
  } else {snapBack();}
  dragX=0;
}

}

// ── Init ─────────────────────────────────────────────────────────────────────
let _listenersAttached = false;
let _clockStarted      = false;

function init(){
  // Reset card index when data changes
  curr = 0;

  // Build progress dots
  document.getElementById("prog-dots").innerHTML=
    EVENTS.map((_,i)=>`<div class="prog-dot${i===0?" active":""}"></div>`).join("");

  // Build all cards
  const stack=document.getElementById("card-stack");
  // Ensure hint arrows exist (they live inside card-stack)
  if(!document.getElementById("hint-l")){
    stack.insertAdjacentHTML("afterbegin",
      `<div class="swipe-hint hint-left" id="hint-l"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2.5" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg></div>`+
      `<div class="swipe-hint hint-right" id="hint-r"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2.5" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg></div>`);
  }
  const existing=[...stack.querySelectorAll(".swipe-card")];
  existing.forEach(e=>e.remove());
  // Insert in reverse so card 0 is on top in DOM and z-index
  [...EVENTS].reverse().forEach((ev,ri)=>{
    const i=EVENTS.length-1-ri;
    stack.insertAdjacentHTML("beforeend",buildCard(ev,i));
  });

  positionAll(0);
  animateGauges();
  updateUI();

  // Attach swipe + keyboard listeners exactly once
  if (!_listenersAttached) {
    stack.addEventListener("mousedown",onDown);
    stack.addEventListener("touchstart",onDown,{passive:true});
    window.addEventListener("mousemove",onMove);
    window.addEventListener("touchmove",onMove,{passive:false});
    window.addEventListener("mouseup",onUp);
    window.addEventListener("touchend",onUp);
    _listenersAttached = true;
  }

  // Clock — starts once, keeps ticking across reinits
  const tick=()=>{const n=new Date();document.getElementById("sb-time").textContent=n.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true}).replace(/ (AM|PM)/,"");};
  tick();
  if (!_clockStarted) { setInterval(tick,30000); _clockStarted = true; }
}

  [['China','Taiwan','Japan','Korea','Asia-Pacific','Indo-Pacific','Beijing','Hong Kong'],'Asia-Pacific'],
  [['Russia','Ukraine','NATO','Europe','European','Germany','France','UK'],'Europe'],
  [['Africa','African','Congo','Nigeria','Kenya','Ethiopia','Zambia','DRC'],'Africa'],
  [['Pakistan','India','South Asia','Bangladesh','Delhi'],'South Asia'],
  [['Pentagon','Congress','Federal Reserve','US budget','Wall Street'],'United States'],
  [['Latin America','Mexico','Brazil','Colombia','Venezuela'],'Latin America'],
];

function detectFlags(text) {
  const seen = new Set(), flags = [];
  for (const [kws, flag] of COUNTRY_FLAGS) {
    if (kws.some(k => text.includes(k)) && !seen.has(flag)) {
      seen.add(flag); flags.push(flag);
    }
  }
  return flags.length ? flags.slice(0,4) : ['🌐'];
}

function detectRegion(text) {
  for (const [kws, region] of REGION_MAP) {
    if (kws.some(k => text.includes(k))) return region;
  }
  return 'Global';
}

function cleanTitle(t) {
  return t.replace(/ - [^-]+$/, '').replace(/ \| .+$/, '').trim();
}

/**
 * Trim `text` so it contains the same number of complete sentences as `refText`.
 * Splits on . ! ? followed by whitespace or end-of-string — never cuts mid-sentence.
 */
function trimToMatchSentences(text, refText) {
  const toSentences = t =>
    t.match(/[^.!?]*[.!?]+(?=\s|$)/g) || [t.trim()];
  const targetCount = toSentences(refText).length;
  const sentences   = toSentences(text);
  return sentences.slice(0, targetCount).join(' ').trim();
}

/** Parse rep + persona scores out of the trend_insight string the API returns.
 * Format: "93% signal score: 100% coverage (70%) + 76% persona relevance (30%)..."
 * Falls back to score-derived estimates if the string doesn't match. */
function parseInsightScores(insight, score) {
  if (insight) {
    // Match "100% coverage" and "76% persona relevance"
    const covM = insight.match(/(\d+)%\s*coverage/);
    const perM = insight.match(/(\d+)%\s*persona/);
    if (covM && perM) {
      return { rep: parseInt(covM[1]) / 100, persona: parseInt(perM[1]) / 100 };
    }
  }
  // Fallback: derive from weighted formula — rep weighted 70%, persona 30%
  // Can't solve exactly from one number, so use score as a symmetric estimate
  return { rep: Math.min(score * 1.15, 1), persona: Math.min(score * 0.85, 1) };
}

function adaptBrief(apiData) {
  return apiData.brief.events.map(ev => {
    const text    = `${ev.event_heading} ${ev.summary} ${ev.why_it_matters}`;
    const score   = ev.trend_score || 0;
    const insight = ev.trend_insight || '';
    const { rep, persona } = parseInsightScores(insight, score);
    const srcCount = (ev.source_articles || []).length;
    // Trim the insight to just the first sentence so it fits the breakdown sheet cleanly
    const insightShort = insight ? insight.split('.')[0] + '.' : 'AI-ranked by coverage + persona relevance.';
    return {
      rank:     ev.rank,
      score,
      rep,
      persona,
      srcCount,
      insight:  insightShort,
      heading:  ev.event_heading,
      summary:  ev.summary,
      why:      trimToMatchSentences(ev.why_it_matters, ev.summary),
      flags:    detectFlags(text),
      region:   detectRegion(text),
      sectors:  ev.sectors_impacted.slice(0, 4).map(s => ({ n: s.name, e: sectorEmoji(s.name) })),
      sources:  ev.source_articles.map(a => ({ t: cleanTitle(a.title), s: a.source_name, u: a.url })),
      grads:    RANK_GRADS[(ev.rank - 1) % RANK_GRADS.length],
    };
  });
}

/**
 * Show a subtle top banner — never wipes the card stack.
 * type: 'info' | 'warn' | 'stale'
 */
function showBanner(text, type = 'info') {
  const bar = document.getElementById('stale-bar');
  const age = document.getElementById('stale-age');
  if (!bar) return;
  const colors = {
    info:  { bg: 'rgba(99,102,241,.08)',  border: 'rgba(99,102,241,.2)',  text: '#4338ca' },
    warn:  { bg: 'rgba(245,158,11,.08)', border: 'rgba(245,158,11,.2)', text: '#92400e' },
    stale: { bg: 'rgba(245,158,11,.08)', border: 'rgba(245,158,11,.2)', text: '#92400e' },
  };
  const c = colors[type] || colors.info;
  bar.style.background    = c.bg;
  bar.style.borderBottom  = `1px solid ${c.border}`;
  bar.style.color         = c.text;
  if (age) age.textContent = '';
  bar.innerHTML = text;
  bar.style.display = 'block';
}

/**
 * Fetch live brief from the API.
 * ALWAYS falls back to the built-in static EVENTS if the API is
 * unavailable, returning an error, or timing out.
 * Customer experience NEVER breaks — there's always something to swipe.
 */
async function fetchAndInit() {
  let usedFallback = false;
  try {
    // 3-second hard timeout — static data already visible, don't keep re-init waiting
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 3000);

    const res = await fetch(API + '/brief', { signal: controller.signal });
    clearTimeout(timer);

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();
    const live = adaptBrief(data);

    if (live && live.length > 0) {
      EVENTS = live;  // replace static demo data with live data

      const meta = data.meta || {};
      if (meta.quota_exhausted && meta.next_refresh_at) {
        const t = new Date(meta.next_refresh_at);
        const hhmm = t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', timeZoneName: 'short' });
        const ago  = meta.last_refreshed_at ? _relativeTime(new Date(meta.last_refreshed_at)) : null;
        showBanner(
          `⏱ ${ago ? `Updated ${ago} · ` : ''}Refreshes ~${hhmm}`,
          'stale'
        );
      } else if (meta.is_stale) {
        const mins  = Math.round(meta.age_minutes || 0);
        const label = mins >= 90 ? `${Math.round(mins / 60)}h` : `${mins}m`;
        showBanner(`⏱ Data is ${label} old · refreshing hourly`, 'stale');
      }
    } else {
      // API responded but returned empty events — keep static data
      usedFallback = true;
    }
  } catch (e) {
    // Network error, timeout, CORS, or bad JSON — all handled silently
    console.warn('[NTM] API unavailable, using built-in brief:', e.message);
    usedFallback = true;
  }

  if (usedFallback) {
    showBanner('📡 Showing sample brief &nbsp;·&nbsp; <a href="javascript:fetchAndInit()" style="color:inherit;text-decoration:underline">Retry</a>', 'info');
  }

  init();  // always runs — live data or static fallback, never a blank screen
}

/** Returns a human-readable relative-time string (e.g. "3h ago", "just now"). */
function _relativeTime(date) {
  const diff = Date.now() - date.getTime();
  const m = Math.round(diff / 60000);
  if (m <  2) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.round(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.round(h / 24)}d ago`;
}

document.addEventListener('DOMContentLoaded', () => {
  init();          // render static built-in data immediately — no spinner, instant content
  fetchAndInit();  // silently fetch live data in background and upgrade if available
});
