<svg width="390" height="120" viewBox="0 0 390 120" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="mattersActive" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="mattersInactive" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(124,58,237,0.10)"/>
      <stop offset="100%" stop-color="rgba(192,38,211,0.07)"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
  </defs>

  <!-- Two side-by-side states -->

  <!-- LEFT: "What Happened" active state -->
  <rect x="8" y="8" width="180" height="104" rx="16" fill="white" filter="url(#cardShadow)"/>
  <text x="98" y="30" font-size="9" font-weight="700" fill="#9ca3af" text-anchor="middle" letter-spacing="0.5">DEFAULT STATE</text>
  <rect x="16" y="38" width="164" height="30" rx="9" fill="#f3f4f6"/>
  <!-- What Happened active -->
  <rect x="19" y="41" width="74" height="24" rx="7" fill="white"/>
  <rect x="19" y="41" width="74" height="24" rx="7" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="0.5"/>
  <text x="56" y="57" font-size="10" font-weight="600" fill="#111827" text-anchor="middle">What Happened</text>
  <!-- Why It Matters inactive but still accent-tinted -->
  <rect x="97" y="41" width="80" height="24" rx="7" fill="url(#mattersInactive)" stroke="rgba(124,58,237,0.18)" stroke-width="1"/>
  <text x="137" y="57" font-size="10" font-weight="700" fill="#7c3aed" text-anchor="middle">✦ Why It Matters</text>

  <text x="98" y="90" font-size="9" fill="#6b7280" text-anchor="middle">Reading summary</text>
  <text x="98" y="104" font-size="9" fill="#9ca3af" text-anchor="middle">tab pulls eye even inactive</text>

  <!-- RIGHT: "Why It Matters" active state -->
  <rect x="202" y="8" width="180" height="104" rx="16" fill="white" filter="url(#cardShadow)"/>
  <text x="292" y="30" font-size="9" font-weight="700" fill="#9ca3af" text-anchor="middle" letter-spacing="0.5">WHY IT MATTERS ACTIVE</text>
  <rect x="210" y="38" width="164" height="30" rx="9" fill="#f3f4f6"/>
  <!-- What Happened inactive -->
  <rect x="213" y="41" width="74" height="24" rx="7" fill="transparent"/>
  <text x="250" y="57" font-size="10" font-weight="600" fill="#9ca3af" text-anchor="middle">What Happened</text>
  <!-- Why It Matters active — full gradient -->
  <rect x="291" y="41" width="80" height="24" rx="7" fill="url(#mattersActive)"/>
  <text x="331" y="57" font-size="10" font-weight="700" fill="white" text-anchor="middle">✦ Why It Matters</text>

  <text x="292" y="90" font-size="9" fill="#6b7280" text-anchor="middle">Full purple gradient fill</text>
  <text x="292" y="104" font-size="9" fill="#9ca3af" text-anchor="middle">+ white text + glow shadow</text>
</svg>
